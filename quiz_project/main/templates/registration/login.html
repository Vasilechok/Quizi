<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Вхід</title>
</head>
<body>
    <h1>Вхід</h1>

    {% if form.errors %}
        <p style="color:red;">Неправильний логін або пароль</p>
    {% endif %}

    <form method="post">
        {% csrf_token %}
        {{ form.username.label_tag }}<br>
        {{ form.username }}<br><br>

        {{ form.password.label_tag }}<br>
        {{ form.password }}<br><br>

        <button type="submit">Увійти</button>
    </form>
</body>
</html>
