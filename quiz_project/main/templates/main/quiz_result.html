<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Результат</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #0f1f17, #000);
            color: #e5ffe5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: linear-gradient(180deg, #0b1b14, #020504);
            border: 1px solid #1aff8c55;
            border-radius: 20px;
            padding: 50px 60px;
            width: 100%;
            max-width: 420px;
            text-align: center;
            box-shadow:
                0 0 30px #00ff8855,
                inset 0 0 20px #00ff8844;
        }

        h1 {
            margin-bottom: 20px;
            font-size: 34px;
            color: #1aff8c;
            text-shadow: 0 0 12px #00ff88;
        }

        .score {
            font-size: 48px;
            font-weight: bold;
            color: #00ff88;
            text-shadow: 0 0 20px #00ff88;
            margin: 20px 0 30px;
        }

        .label {
            font-size: 18px;
            opacity: 0.85;
        }

        .home-btn {
            background: linear-gradient(135deg, #00ff88, #0fa);
            color: #002b18;
            border: none;
            border-radius: 14px;
            padding: 14px 24px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 0 14px #00ff8880;
            text-decoration: none;
            display: inline-block;
        }

        .home-btn:hover {
            transform: translateY(-2px) scale(1.05);
            box-shadow: 0 0 24px #00ff88;
        }
    </style>
</head>

<body>
<div class="container">

    <h1>🏁 Результат</h1>

    <div class="label">Твій результат</div>
    <div class="score">{{ score }}</div>

    <a href="{% url 'home' %}" class="home-btn">
        🏠 На головну
    </a>

</div>
</body>
</html>
