<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Створити вікторину</title>

    <style>
        :root {
            --green: #2ecc71;
            --green-dark: #27ae60;
            --black: #0f0f0f;
            --gray: #1c1c1c;
            --text: #eaeaea;
        }

        * {
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(46,204,113,0.15), transparent 40%),
                linear-gradient(180deg, #000, var(--black));
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .card {
            background: linear-gradient(180deg, #111, var(--gray));
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 600px;
            box-shadow:
                0 0 0 1px rgba(46,204,113,0.15),
                0 20px 40px rgba(0,0,0,0.6);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--green);
            text-shadow: 0 0 10px rgba(46,204,113,0.3);
        }

        .hint {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 25px;
        }

        form p {
            margin: 15px 0;
        }

        input, textarea, select {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0b0b0b;
            color: var(--text);
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
        }

        input:focus, textarea:focus, select:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 2px rgba(46,204,113,0.25);
        }

        .actions {
            margin-top: 30px;
            display: flex;
            gap: 15px;
            align-items: center;
        }

        button {
            flex: 1;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(46,204,113,0.4);
        }

        button:active {
            transform: translateY(0);
        }

        .back {
            color: #aaa;
            text-decoration: none;
            font-size: 14px;
            transition: color 0.2s;
        }

        .back:hover {
            color: var(--green);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Створити вікторину</h1>
        <div class="hint">
            Назва, опис — тут починається твій квіз 🧠
        </div>

        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}

            <div class="actions">
                <button type="submit">➕ Додати питання</button>
                <a class="back" href="{% url 'home' %}">← Назад</a>
            </div>
        </form>
    </div>

</body>
</html>
