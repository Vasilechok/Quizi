<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Додати питання</title>

    <style>
        :root {
            --green: #2ecc71;
            --green-dark: #27ae60;
            --black: #0f0f0f;
            --gray: #1c1c1c;
            --text: #eaeaea;
        }

        * {
            box-sizing: border-box;
            font-family: "Segoe UI", system-ui, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background:
                radial-gradient(circle at top, rgba(46,204,113,0.15), transparent 40%),
                linear-gradient(180deg, #000, var(--black));
            color: var(--text);
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .card {
            background: linear-gradient(180deg, #111, var(--gray));
            border-radius: 16px;
            padding: 32px;
            width: 100%;
            max-width: 650px;
            box-shadow:
                0 0 0 1px rgba(46,204,113,0.15),
                0 20px 40px rgba(0,0,0,0.6);
        }

        h1 {
            margin-top: 0;
            margin-bottom: 10px;
            color: var(--green);
            text-shadow: 0 0 10px rgba(46,204,113,0.3);
        }

        h3 {
            margin-top: 30px;
            margin-bottom: 10px;
            color: var(--green);
        }

        .hint {
            color: #aaa;
            font-size: 14px;
            margin-bottom: 20px;
        }

        form p {
            margin: 15px 0;
        }

        input[type="text"] {
            width: calc(100% - 40px);
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #0b0b0b;
            color: var(--text);
            outline: none;
            transition: border 0.2s, box-shadow 0.2s;
        }

        input[type="text"]:focus {
            border-color: var(--green);
            box-shadow: 0 0 0 2px rgba(46,204,113,0.25);
        }

        .answer {
            display: flex;
            align-items: center;
            gap: 10px;
            background: rgba(255,255,255,0.02);
            padding: 10px;
            border-radius: 10px;
            border: 1px solid #222;
            transition: border 0.2s, background 0.2s;
        }

        .answer:hover {
            border-color: var(--green-dark);
            background: rgba(46,204,113,0.05);
        }

        input[type="radio"] {
            accent-color: var(--green);
            transform: scale(1.2);
            cursor: pointer;
        }

        button {
            margin-top: 30px;
            width: 100%;
            padding: 14px;
            border-radius: 12px;
            border: none;
            background: linear-gradient(135deg, var(--green), var(--green-dark));
            color: #000;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.15s, box-shadow 0.15s;
        }

        button:hover {
            transform: translateY(-1px);
            box-shadow: 0 8px 20px rgba(46,204,113,0.4);
        }

        button:active {
            transform: translateY(0);
            box-shadow: 0 4px 10px rgba(46,204,113,0.3);
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Додати питання</h1>
        <div class="hint">Квіз: <strong>{{ quiz.title }}</strong></div>

        <form method="post">
            {% csrf_token %}

            {{ form.as_p }}

            <h3>Відповіді</h3>

            <div class="answer">
                <input type="radio" name="correct" value="1" required>
                <input type="text" name="answer_1" placeholder="Відповідь 1" required>
            </div>

            <div class="answer">
                <input type="radio" name="correct" value="2">
                <input type="text" name="answer_2" placeholder="Відповідь 2" required>
            </div>

            <div class="answer">
                <input type="radio" name="correct" value="3">
                <input type="text" name="answer_3" placeholder="Відповідь 3">
            </div>

            <div class="answer">
                <input type="radio" name="correct" value="4">
                <input type="text" name="answer_4" placeholder="Відповідь 4">
            </div>

            <button type="submit">💾 Зберегти питання</button>
        </form>
    </div>

</body>
</html>
