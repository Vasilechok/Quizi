<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Видалити квіз</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #0f1f17, #000);
            color: #e5ffe5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: linear-gradient(180deg, #0b1b14, #020504);
            border: 1px solid #ff4d4d55;
            border-radius: 18px;
            padding: 40px 50px;
            width: 100%;
            max-width: 520px;
            box-shadow:
                0 0 25px #ff4d4d55,
                inset 0 0 20px #ff4d4d44;
            text-align: center;
        }

        h1 {
            margin-bottom: 15px;
            font-size: 30px;
            color: #ff4d4d;
            text-shadow: 0 0 10px #ff4d4d;
        }

        p {
            font-size: 17px;
            opacity: 0.9;
            margin-bottom: 30px;
        }

        strong {
            color: #1aff8c;
        }

        .actions {
            display: grid;
            gap: 14px;
        }

        button {
            background: linear-gradient(135deg, #ff4d4d, #ff1a1a);
            color: white;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 0 12px #ff4d4d80;
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 20px #ff4d4d;
        }

        .secondary {
            background: transparent;
            color: #1aff8c;
            border: 1px solid #1aff8c;
            box-shadow: none;
        }

        .secondary:hover {
            background: #1aff8c22;
        }

        form {
            margin: 0;
        }
    </style>
</head>

<body>
<div class="container">
    <h1>Видалити квіз</h1>

    <p>
        Ти впевнений, що хочеш видалити квіз<br>
        <strong>"{{ quiz.title }}"</strong>?
    </p>

    <div class="actions">
        <form method="post">
            {% csrf_token %}
            <button type="submit">🗑 Так, видалити</button>
        </form>

        <form action="{% url 'my_quizzes' %}" method="get">
            <button class="secondary">⬅ Скасувати</button>
        </form>
    </div>
</div>
</body>
</html>
