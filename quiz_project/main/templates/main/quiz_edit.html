<!DOCTYPE html>
<html lang="uk">
<head>
    <meta charset="UTF-8">
    <title>Редагувати квіз</title>

    <style>
        * {
            box-sizing: border-box;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        body {
            margin: 0;
            min-height: 100vh;
            background: radial-gradient(circle at top, #0f1f17, #000);
            color: #e5ffe5;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .container {
            background: linear-gradient(180deg, #0b1b14, #020504);
            border: 1px solid #1aff8c55;
            border-radius: 18px;
            padding: 40px 50px;
            width: 100%;
            max-width: 500px;
            box-shadow:
                0 0 25px #00ff8855,
                inset 0 0 20px #00ff8844;
        }

        h1 {
            text-align: center;
            margin-bottom: 30px;
            font-size: 30px;
            color: #1aff8c;
            text-shadow: 0 0 10px #00ff88;
        }

        form p {
            margin-bottom: 18px;
        }

        input, textarea, select {
            width: 100%;
            padding: 12px;
            border-radius: 10px;
            border: 1px solid #1aff8c55;
            background: #020504;
            color: #e5ffe5;
            font-size: 15px;
        }

        input:focus, textarea:focus, select:focus {
            outline: none;
            border-color: #1aff8c;
            box-shadow: 0 0 10px #00ff8880;
        }

        textarea {
            resize: vertical;
            min-height: 90px;
        }

        .actions {
            display: grid;
            gap: 14px;
            margin-top: 25px;
        }

        button {
            width: 100%;
            background: linear-gradient(135deg, #00ff88, #0fa);
            color: #002b18;
            border: none;
            border-radius: 12px;
            padding: 14px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.25s ease;
            box-shadow: 0 0 12px #00ff8880;
        }

        button:hover {
            transform: translateY(-2px) scale(1.02);
            box-shadow: 0 0 20px #00ff88;
        }

        .secondary {
            background: transparent;
            color: #1aff8c;
            border: 1px solid #1aff8c;
            box-shadow: none;
        }

        .secondary:hover {
            background: #1aff8c22;
        }

        a {
            text-decoration: none;
        }
    </style>
</head>

<body>
<div class="container">

    <h1>Редагувати квіз</h1>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}

        <div class="actions">
            <button type="submit">💾 Зберегти</button>
            <a href="{% url 'my_quizzes' %}">
                <button type="button" class="secondary">⬅ Назад</button>
            </a>
        </div>
    </form>

</div>
</body>
</html>
